services:
  - type: web
    name: cafe-billing-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-billing-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: cafe-billing-db
    databaseName: cafedb
    user: cafeuser
